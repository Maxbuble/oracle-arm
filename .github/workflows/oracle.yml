name: Oracle ARM — Multi-Region AUTO-STOP

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  oracle-arm:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    strategy:
      matrix:
        runner: [1, 2, 3]

    steps:
      - name: Info runner
        run: echo "Runner ${{ matrix.runner }} activo"

      - name: Instalar OCI CLI
        run: pip install oci-cli --quiet

      - name: Configurar OCI
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/private_key.pem
          EOF

          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/private_key.pem
          chmod 600 ~/.oci/private_key.pem ~/.oci/config

      # =========================
      # 🔍 CHECK INSTANCIA
      # =========================
      - name: Buscar instancia
        id: instance
        run: |
          DATA=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --display-name "ia-local" \
            --query 'data[0].{id:id,mem:"shape-config"."memory-in-gbs"}' \
            --raw-output 2>/dev/null || true)

          if [ -z "$DATA" ] || [ "$DATA" = "null" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "id=$(echo $DATA | awk '{print $1}')" >> $GITHUB_OUTPUT
            echo "mem=$(echo $DATA | awk '{print $2}')" >> $GITHUB_OUTPUT
          fi

      # =========================
      # 🛑 AUTO STOP 24GB
      # =========================
      - name: Stop si ya 24GB
        if: steps.instance.outputs.mem == '24'
        run: echo "Ya tienes 24GB. Fin."

      # =========================
      # 🚀 CREACIÓN MULTI-REGIÓN
      # =========================
      - name: Crear instancia multi-region
        if: steps.instance.outputs.found == 'false' && matrix.runner == 1
        shell: bash
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/ssh_key.pub

          REGIONS=(
            "eu-madrid-1"
            "eu-frankfurt-1"
            "us-ashburn-1"
          )

          AD_SUFFIXES=("AD-1" "AD-2" "AD-3")

          SHAPES=(
            '{"ocpus":1,"memoryInGBs":6}'
            '{"ocpus":2,"memoryInGBs":12}'
          )

          for i in {1..20}; do
            echo "Intento $i"

            for REGION in "${REGIONS[@]}"; do
              for AD in "${AD_SUFFIXES[@]}"; do
                for SHAPE in "${SHAPES[@]}"; do

                  OUTPUT=$(oci compute instance launch \
                    --region "$REGION" \
                    --availability-domain "dSWi:${REGION}:$AD" \
                    --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
                    --shape "VM.Standard.A1.Flex" \
                    --shape-config "$SHAPE" \
                    --image-id "${{ secrets.OCI_IMAGE_ID }}" \
                    --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
                    --assign-public-ip true \
                    --display-name "ia-local" \
                    --ssh-authorized-keys-file /tmp/ssh_key.pub 2>&1 || true)

                  if echo "$OUTPUT" | grep -q '"id"'; then
                    echo "✅ Instancia creada en $REGION / $AD"
                    exit 0
                  fi

                  if echo "$OUTPUT" | grep -Ei "Out of capacity|limit|capacity"; then
                    echo "Sin capacidad en $REGION"
                  fi

                done
              done
            done

            sleep $((RANDOM % 5 + 6))
          done

      # =========================
      # 🔼 UPGRADE 24GB
      # =========================
      - name: Upgrade a 24GB multi-intento
        if: steps.instance.outputs.found == 'true' && steps.instance.outputs.mem != '24'
        shell: bash
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.id }}"
          TARGET='{"ocpus":4,"memoryInGBs":24}'

          for i in {1..25}; do
            echo "Upgrade intento $i"

            OUTPUT=$(oci compute instance update \
              --instance-id "$INSTANCE_ID" \
              --shape-config "$TARGET" 2>&1 || true)

            if echo "$OUTPUT" | grep -q '"memoryInGBs": 24'; then
              echo "🔥 24GB CONSEGUIDOS"
              exit 0
            fi

            sleep $((RANDOM % 5 + 6))
          done
