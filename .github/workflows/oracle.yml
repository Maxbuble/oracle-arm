name: Oracle Madrid Hunter PRO
on:
  schedule:
    - cron: '*/5 * * * *' # Se ejecuta cada 5 minutos
  workflow_dispatch: # Permite ejecución manual

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Tiempo suficiente para los reintentos
    
    steps:
      - name: Instalar OCI CLI
        run: pip install oci-cli --quiet

      - name: Configurar OCI
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/private_key.pem
          EOF
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/private_key.pem
          chmod 600 ~/.oci/private_key.pem ~/.oci/config

      - name: Bucle de Caza en Madrid
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/ssh.pub
          
          # Realiza 15 intentos internos separados por 20 segundos
          for i in {1..15}; do
            echo "--- Intento de caza $i ---"
            
            RESPONSE=$(oci compute instance launch \
              --availability-domain "${{ secrets.OCI_AD }}" \
              --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":4,"memoryInGBs":24}' \
              --image-id "${{ secrets.OCI_IMAGE_ID }}" \
              --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
              --assign-public-ip true \
              --display-name "ia-local" \
              --ssh-authorized-keys-file /tmp/ssh.pub 2>&1)

            if echo "$RESPONSE" | grep -qE '"lifecycle-state": "(PROVISIONING|RUNNING)"'; then
              echo "🔥 ¡LO LOGRASTE! La instancia se está creando."
              exit 0
            elif echo "$RESPONSE" | grep -q "Out of capacity"; then
              echo "❌ Sin stock. Reintentando en 20 segundos..."
              sleep 20
            else
              echo "⚠️ Error de configuración: $RESPONSE"
              exit 1
            fi
          done
