name: Oracle ARM — Híbrido PRO (parallel)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  oracle-arm:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    strategy:
      matrix:
        runner: [1,2,3]

    steps:
      - name: Runner info
        run: echo "Ejecutando en runner ${{ matrix.runner }}"

      - name: Instalar OCI CLI
        run: pip install oci-cli --quiet

      - name: Configurar OCI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
          echo "key_file=/home/runner/.oci/private_key.pem" >> ~/.oci/config
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/private_key.pem
          chmod 600 ~/.oci/private_key.pem ~/.oci/config

      - name: Buscar instancia existente
        id: instance
        run: |
          INSTANCE_ID=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --display-name "ia-local" \
            --query 'data[0].id' \
            --raw-output 2>/dev/null)

          if [ "$INSTANCE_ID" = "null" ] || [ -z "$INSTANCE_ID" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          fi

      # =========================
      # 🚀 CREAR INSTANCIA
      # =========================
      - name: Crear instancia (solo runner 1 manda)
        if: steps.instance.outputs.found == 'false' && matrix.runner == 1
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/ssh_key.pub

          ADS=("AD-1" "AD-2" "AD-3")
          SHAPES=(
            '{"ocpus":1,"memoryInGBs":6}'
            '{"ocpus":2,"memoryInGBs":12}'
          )

          for i in {1..25}; do
            echo "Intento creación $i"

            for AD in "${ADS[@]}"; do
              for SHAPE in "${SHAPES[@]}"; do

                OUTPUT=$(oci compute instance launch \
                  --availability-domain "dSWi:EU-MADRID-1-$AD" \
                  --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
                  --shape "VM.Standard.A1.Flex" \
                  --shape-config "$SHAPE" \
                  --image-id "${{ secrets.OCI_IMAGE_ID }}" \
                  --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
                  --assign-public-ip true \
                  --display-name "ia-local" \
                  --ssh-authorized-keys-file /tmp/ssh_key.pub 2>&1)

                echo "$OUTPUT"

                if echo "$OUTPUT" | grep -q '"id"'; then
                  echo "✅ INSTANCIA CREADA"
                  exit 0
                fi

              done
            done

            sleep $((RANDOM % 5 + 6))
          done

      # =========================
      # 🔼 UPGRADE (todos los runners ayudan)
      # =========================
      - name: Intentar upgrade a 24GB
        if: steps.instance.outputs.found == 'true'
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.id }}"
          TARGET='{"ocpus":4,"memoryInGBs":24}'

          for i in {1..30}; do
            echo "Runner ${{ matrix.runner }} → intento upgrade $i"

            OUTPUT=$(oci compute instance update \
              --instance-id "$INSTANCE_ID" \
              --shape-config "$TARGET" 2>&1)

            echo "$OUTPUT"

            if echo "$OUTPUT" | grep -q '"memoryInGBs": 24'; then
              echo "🔥 UPGRADE CONSEGUIDO"
              exit 0
            fi

            sleep $((RANDOM % 5 + 6))
          done
