name: Oracle Madrid Hunter
on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '2-59/5 * * * *'
    - cron: '4-59/5 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Instalar OCI CLI
        run: pip install oci-cli --quiet

      - name: Configurar OCI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
          echo "key_file=/home/runner/.oci/private_key.pem" >> ~/.oci/config
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/private_key.pem
          chmod 600 ~/.oci/private_key.pem ~/.oci/config

      - name: Comprobar si la instancia ya existe
        id: check
        run: |
          COUNT=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --display-name "ia-local" \
            --lifecycle-state RUNNING \
            --query 'length(data)' \
            --raw-output 2>/dev/null)
          if [ -z "$COUNT" ] || [ "$COUNT" = "null" ]; then COUNT=0; fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Instancias activas: $COUNT"

      - name: Intentar crear la instancia
        if: steps.check.outputs.count == '0'
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/ssh.pub

          RESPONSE=$(timeout 90 oci compute instance launch \
            --availability-domain "dSWi:EU-MADRID-1-AD-1" \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --image-id "ocid1.image.oc1.eu-madrid-1.aaaaaaaa7rcvdaff45ybwthn46rkimr42mvzrdyfssah5rtwommnlnruna5q" \
            --subnet-id "ocid1.subnet.oc1.eu-madrid-1.aaaaaaaaibmn7uyuhrvy4xdoz4gxmnb427n73ykhesee7gpz34fbfcktcada" \
            --assign-public-ip true \
            --display-name "ia-local" \
            --ssh-authorized-keys-file /tmp/ssh.pub 2>&1) || true

          echo "$RESPONSE" | head -25

          if [ -z "$RESPONSE" ] || [ ${#RESPONSE} -lt 50 ]; then
            echo "⏱️ Timeout — Oracle no respondió. Reintentando en el próximo cron"
          elif echo "$RESPONSE" | grep -qE '"lifecycle-state": "(PROVISIONING|RUNNING)"'; then
            echo "🔥 ¡INSTANCIA CREADA! Desactiva el workflow."
            IP=$(echo "$RESPONSE" | grep -oP '"public-ip":\s*"\K[^"]+' | head -1)
            curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=🔥 Instancia Oracle ARM creada! IP: $IP"
          elif echo "$RESPONSE" | grep -q "Out of host capacity"; then
            echo "❌ Sin capacidad — el próximo cron reintentará"
          elif echo "$RESPONSE" | grep -qE "TooManyRequests|429"; then
            echo "⚠️ Rate limit 429 — esperando al próximo cron"
          else
            echo "⚠️ Respuesta inesperada — el cron reintentará"
          fi

      - name: La instancia ya existe
        if: steps.check.outputs.count != '0'
        run: echo "✅ La instancia ya existe. Desactiva este workflow."
