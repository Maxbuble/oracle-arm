name: Oracle ARM Hunter 🚀

on:
  schedule:
    - cron: '*/5 * * * *' # Cada 5 min
  workflow_dispatch:

jobs:
  oracle-arm:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Un poco más de tiempo para los reintentos
    concurrency:
      group: oracle-arm
      cancel-in-progress: true

    steps:
      - name: Instalar OCI CLI
        run: pip install oci-cli --quiet

      - name: Configurar OCI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
          echo "key_file=/home/runner/.oci/private_key.pem" >> ~/.oci/config
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/private_key.pem
          chmod 600 ~/.oci/private_key.pem ~/.oci/config

      - name: Check Instancia Existente
        id: check
        run: |
          # Buscamos el ID y la memoria actual de la instancia "ia-local"
          INSTANCE_INFO=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --display-name "ia-local" \
            --query "data[?\"lifecycle-state\"=='RUNNING' || \"lifecycle-state\"=='STARTING'].{id:id, mem:\"shape-config\".\"memory-in-gbs\"} | [0]" \
            --raw-output)
          
          if [ "$INSTANCE_INFO" == "null" ] || [ -z "$INSTANCE_INFO" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            ID=$(echo $INSTANCE_INFO | jq -r '.id')
            MEM=$(echo $INSTANCE_INFO | jq -r '.mem')
            echo "found=true" >> $GITHUB_OUTPUT
            echo "id=$ID" >> $GITHUB_OUTPUT
            echo "mem=$MEM" >> $GITHUB_OUTPUT
          fi

      - name: Proceso de Caza (Create o Upgrade)
        run: |
          FOUND="${{ steps.check.outputs.found }}"
          MEM="${{ steps.check.outputs.mem }}"
          
          if [ "$FOUND" == "true" ] && [ "$MEM" == "24.0" ]; then
            echo "✅ Ya tienes la instancia de 24GB funcionando. Saliendo..."
            exit 0
          fi

          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/ssh_key.pub

          # Intentos en bucle para saltarse el "Out of Capacity"
          for i in {1..30}; do
            if [ "$FOUND" == "false" ]; then
              echo "Intentando CREAR instancia (Intento $i)..."
              RESPONSE=$(oci compute instance launch \
                --availability-domain "${{ secrets.OCI_AD }}" \
                --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
                --shape "VM.Standard.A1.Flex" \
                --shape-config '{"ocpus":4,"memoryInGBs":24}' \
                --image-id "${{ secrets.OCI_IMAGE_ID }}" \
                --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
                --assign-public-ip true \
                --display-name "ia-local" \
                --ssh-authorized-keys-file /tmp/ssh_key.pub 2>&1 || true)
            else
              echo "Intentando UPGRADE a 24GB (Intento $i)..."
              RESPONSE=$(oci compute instance update \
                --instance-id "${{ steps.check.outputs.id }}" \
                --shape-config '{"ocpus":4,"memoryInGBs":24}' 2>&1 || true)
            fi

            if echo "$RESPONSE" | grep -q "Out of capacity" || echo "$RESPONSE" | grep -q "TooManyRequests"; then
              echo "❌ Sin stock todavía. Reintentando en breve..."
              sleep 10
            elif echo "$RESPONSE" | grep -iq "id"; then
              echo "🔥 ¡CONSEGUIDO! Instancia lista o actualizada."
              exit 0
            else
              echo "⚠️ Error inesperado: $RESPONSE"
              exit 1
            fi
          done
